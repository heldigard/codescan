name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Install package + dev tools
        run: python -m pip install -e '.[test]'
      - name: Install Python sensors exercised by the test suite
        # vulture/mypy are pure-pip and let the dead/type integration tests
        # actually run in CI (was red for days: dead tests got empty stdout
        # with no vulture). JS/gitleaks/semgrep/pyright tests use fake bins or
        # skip when the binary is absent.
        run: python -m pip install vulture mypy
      - name: Lint
        run: ruff check .
      - name: Run tests
        run: pytest
