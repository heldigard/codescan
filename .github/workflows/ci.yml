name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Install package + dev tools
        run: python -m pip install -e '.[test]'
      - name: Install Python sensors exercised by the test suite
        # vulture/mypy are pure-pip and let the dead/type integration tests run.
        # The suite is otherwise self-contained: gitleaks/semgrep/ruff/pyright/
        # depcruise tests inject fake bins on PATH, and gitleaks/knip tests skip
        # when the real binary is absent — so no npm/golang/release downloads.
        run: python -m pip install vulture mypy
      - name: Lint
        run: ruff check .
      - name: Format
        run: ruff format --check .
      - name: Run tests
        run: pytest
      - name: Offline quality gate (sensor errors only)
        # Report-only for findings; fail the job when a sensor is broken/missing
        # in a way that would silently degrade agent handoffs. Uses --offline so
        # CI stays sandboxed (no semgrep open-world registry fetch).
        run: codescan all -p src --offline --json --summary-only --fail-on errors
