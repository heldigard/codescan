name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install package + dev tools
        run: python -m pip install -e '.[test]'
      - name: Install sensors exercised by the test suite
        # vulture/mypy (pip) + dependency-cruiser (npm) let the dead/type/arch
        # integration tests actually run in CI (was red for days: those tests
        # got empty stdout / missing_tool with no binary). gitleaks/semgrep/
        # pyright/knip tests use fake bins or skip when the binary is absent.
        run: |
          python -m pip install vulture mypy
          npm install -g dependency-cruiser
      - name: Lint
        run: ruff check .
      - name: Run tests
        run: pytest
      - name: Lint
        run: ruff check .
      - name: Run tests
        run: pytest
